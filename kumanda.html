<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📱 oZil Kumanda - Tam Sürüm</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Segoe UI',sans-serif;background-color:#f1f2f6;text-align:center;padding:10px;margin:0}
  h2{color:#2f3542;margin-bottom:10px;font-size:20px}

  /* --- KARTLAR VE DÜZEN --- */
  .card{background:white;padding:15px;border-radius:15px;box-shadow:0 4px 6px rgba(0,0,0,.1);margin-bottom:15px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  
  /* --- BUTONLAR --- */
  .btn{padding:15px 5px;font-size:14px;font-weight:bold;color:#fff;background-color:#0984e3;
    border:none;border-radius:8px;box-shadow:0 4px #06528d;display:flex;flex-direction:column;
    align-items:center;justify-content:center;cursor:pointer;width:100%;transition:0.2s}
  .btn:active{box-shadow:0 1px #043e6b;transform:translateY(3px)}
  
  .full{grid-column:span 2}
  .blue{background-color:#0984e3;box-shadow:0 4px #06528d}
  .green{background-color:#2ecc71;box-shadow:0 4px #27ae60}
  .orange{background-color:#f39c12;box-shadow:0 4px #e67e22}
  .red{background-color:#e74c3c;box-shadow:0 4px #c0392b}
  .dark{background-color:#2c3e50;box-shadow:0 4px #1a252f}
  .purple{background-color:#8e44ad;box-shadow:0 4px #732d91}
  .gray{background-color:#57606f;box-shadow:0 4px #3d4450}
  
  .icon{font-size:22px;margin-bottom:5px}
  
  /* --- DURUM ÇUBUĞU --- */
  #durum_bar{font-size:12px;padding:4px 10px;border-radius:20px;display:inline-block;margin-bottom:8px}
  .durum-bagli{background:#d4edda;color:#155724}
  .durum-bekliyor{background:#fff3cd;color:#856404}
  
  /* --- TOAST VE MODAL --- */
  #toast{visibility:hidden;background-color:#333;color:#fff;text-align:center;padding:10px;
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);border-radius:5px;z-index:99;min-width:200px}
  .show{visibility:visible !important;animation:fadein .3s,fadeout .5s 2.5s}
  
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes fadeout{from{opacity:1}to{opacity:0}}
  
  input[type=range]{width:100%;height:15px;border-radius:5px;background:#dfe4ea;outline:none}
  .footer{margin-top:20px;display:flex;justify-content:space-around;padding-bottom:20px;border-top:1px solid #ddd;padding-top:15px}
  .footer a{text-decoration:none;color:#0984e3;font-weight:bold;cursor:pointer;font-size:14px;display:flex;flex-direction:column;gap:5px}

  /* --- MODAL TASARIMI --- */
  .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:100;padding:20px}
  .modal-icerik{background:white;border-radius:15px;padding:20px;max-height:80vh;overflow-y:auto}
</style>
</head>
<body>

<div id="ekran_giris">
  <h2>Nimetullah Nahçivani İHO<br><span style="font-size:16px;color:#7f8c8d">Mobil Kumanda</span></h2>
  <div class="card">
    <input type="password" id="inp_sifre" placeholder="Mobil Kumanda Şifresi" 
           style="width:100%;padding:15px;border-radius:8px;border:1px solid #ddd;margin-bottom:15px;text-align:center">
    <button class="btn blue full" style="padding:15px" onclick="girisYap()">GİRİŞ YAP</button>
  </div>
</div>

<div id="ekran_kumanda" style="display:none">
  <h2>Nimetullah Nahçivani İHO<br><span style="font-size:14px;color:#7f8c8d" id="lbl_pc">BTR-PC - Kumanda</span></h2>
  <div id="durum_bar" class="durum-bekliyor">⏳ Bağlanıyor...</div>

  <div class="card">
    <strong>🎤 Canlı Sesli Anons</strong>
    <div style="display:flex;margin-top:10px;gap:8px">
      <input type="text" id="txt_anons" placeholder="Duyuru metnini yazın..." 
             style="flex:1;padding:10px;border:1px solid #ddd;border-radius:5px">
      <select id="anons_tekrar" style="padding:10px;border-radius:5px;background:#fff">
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="3">3x</option>
      </select>
      <button class="btn blue" style="width:auto;padding:10px 15px;flex-direction:row" onclick="anonsGonder()">🔊 Oku</button>
    </div>
  </div>

  <div class="card">
    <strong>🔊 Sistem Ses Seviyesi</strong>
    <div style="margin:15px 0">
      <input type="range" id="ses_slider" min="0" max="100" value="80" oninput="sesGuncelle(this.value)">
    </div>
    <div id="vol_val">%80</div>
  </div>

  <div class="grid">
    <button class="btn dark" onclick="komutGonder('toplanma_zil','Toplanma Zili')"><span class="icon">🔔</span>Toplanma</button>
    <button class="btn blue" onclick="komutGonder('ogr_zil','Öğrenci Zili')"><span class="icon">🧑‍🎓</span>Öğrenci</button>
    <button class="btn green" onclick="komutGonder('ogrt_zil','Öğretmen Zili')"><span class="icon">👨‍🏫</span>Öğretmen</button>
    <button class="btn orange" onclick="komutGonder('cikis_zil','Çıkış Zili')"><span class="icon">🚪</span>Çıkış</button>
  </div>

  <div class="grid">
    <button class="btn red" onclick="komutGonder('istiklal','İstiklal Marşı')">TR<br>İstiklal Marşı</button>
    <button class="btn red" onclick="komutGonder('siren','Siren Sesi')">🚨<br>Siren Sesi</button>
    <button class="btn red" onclick="komutGonder('saygi_1','1 Dakika Saygı')">⏱️<br>1 Dakika Saygı Duruşu</button>
    <button class="btn red" onclick="komutGonder('saygi_1_ist','1 Dk Saygı + İstiklal')">⏱️<br>1 Dk Saygı + İstiklal</button>
    <button class="btn red full" onclick="komutGonder('saygi_2_ist','2 Dakika Saygı + İstiklal')">⏱️<br>2 Dakika Saygı Duruşu + İstiklal Marşı</button>
  </div>

  <div class="grid">
    <button class="btn purple full" onclick="modalAc('modal_zil')">🎼 ZİL MELODİSİ SEÇ</button>
    <button class="btn purple full" onclick="modalAc('modal_sarki')">🎵 ŞARKI LİSTESİ</button>
    <button class="btn purple full" onclick="komutGonder('muzik_toggle','Müzik Yayını')">📻 Müzik Yayını (Aç/Kapat)</button>
    <button class="btn gray full" onclick="komutGonder('sustur','Sistemi Sustur')">⏹️ SİSTEMİ SUSTUR</button>
    <button id="btn_sistem" class="btn green full" onclick="sistemToggle()">✅ SİSTEM: AÇIK</button>
  </div>

  <div class="footer">
    <a onclick="modalAc('modal_genel')">⚙️ Genel</a>
    <a onclick="toast('Şifre Yönetimi')">🔐 Şifre</a>
    <a onclick="toast('QR Kod')">📱 QR</a>
    <a onclick="location.reload()">🚪 Çıkış</a>
  </div>
</div>

<div id="modal_zil" class="modal">
  <div class="modal-icerik">
    <h3>🎵 Zil Melodisi Seç</h3>
    <div id="zil_liste_container" style="text-align:left; margin-bottom:15px">Liste yükleniyor...</div>
    <button class="btn blue full" onclick="modalKapat('modal_zil')">Kapat</button>
  </div>
</div>

<div id="modal_sarki" class="modal">
  <div class="modal-icerik">
    <h3>🎼 Şarkı Listesi</h3>
    <div id="sarki_liste_container" style="text-align:left; margin-bottom:15px">Şarkılar yükleniyor...</div>
    <button class="btn blue full" onclick="modalKapat('modal_sarki')">Kapat</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- FIREBASE AYARLARI ---
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAJSKfy8otqrah-efNzI0OoLlFETqMsJEM",
  authDomain: "ozil-99982.firebaseapp.com",
  databaseURL: "https://ozil-99982-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ozil-99982",
  storageBucket: "ozil-99982.firebasestorage.app",
  messagingSenderId: "120039746207",
  appId: "1:120039746207:web:bad5f22a77a4669d1890aa"
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const DB_YOLU = {
  komut: "kumanda/komut",
  anons: "kumanda/anons",
  ses: "kumanda/ses",
  durum: "kumanda/durum",
  sistem: "kumanda/sistem_durum",
  sarki_liste: "kumanda/sarki_liste",
  zil_liste: "kumanda/zil_listesi"
};

let girisYapildi = false;

// --- FONKSİYONLAR ---
function girisYap() {
  const sifre = document.getElementById("inp_sifre").value;
  // Burada senin SHA-256 veya sabit şifre mantığın çalışacak
  if(sifre === "1234") { 
    document.getElementById("ekran_giris").style.display = "none";
    document.getElementById("ekran_kumanda").style.display = "block";
    dinleyicileriBaslat();
  } else { toast("Hatalı Şifre!"); }
}

function dinleyicileriBaslat() {
  // PC Durumu
  db.ref(DB_YOLU.durum).on("value", snap => {
    const v = snap.val() || {};
    const bar = document.getElementById("durum_bar");
    if(v.cevrimici) { 
      bar.textContent = "🟢 Bağlı — " + (v.pc_adi || "BTR-PC"); 
      bar.className = "durum-bagli"; 
    } else { 
      bar.textContent = "🔴 PC Çevrimdışı"; 
      bar.className = "durum-bekliyor"; 
    }
  });

  // Ses Senkronizasyonu
  db.ref(DB_YOLU.ses).on("value", snap => {
    if(snap.val() !== null) {
      document.getElementById("ses_slider").value = snap.val();
      document.getElementById("vol_val").textContent = "%" + snap.val();
    }
  });
}

function sesGuncelle(val) {
  document.getElementById("vol_val").textContent = "%" + val;
  clearTimeout(window.sesTimer);
  window.sesTimer = setTimeout(() => {
    db.ref(DB_YOLU.ses).set(parseInt(val));
  }, 250);
}

function komutGonder(kod, isim) {
  db.ref(DB_YOLU.komut).set({ kod: kod, zaman: Date.now() })
    .then(() => toast(isim + " iletildi ✓"));
}

function anonsGonder() {
  const metin = document.getElementById("txt_anons").value;
  const tekrar = document.getElementById("anons_tekrar").value;
  if(!metin) return;
  db.ref(DB_YOLU.anons).set({ metin: metin + "||" + tekrar, zaman: Date.now() })
    .then(() => {
      toast("Anons Gönderildi (" + tekrar + "x)");
      document.getElementById("txt_anons").value = "";
    });
}

function modalAc(id) { document.getElementById(id).style.display = "block"; }
function modalKapat(id) { document.getElementById(id).style.display = "none"; }

function toast(msg) {
  const t = document.getElementById("toast");
  t.innerHTML = msg; t.className = "show";
  setTimeout(() => t.className = "", 3000);
}
</script>
</body>
</html>
