<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📱 oZil Kumanda</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Segoe UI',sans-serif;background-color:#f1f2f6;text-align:center;padding:10px;margin:0}
  h2{color:#2f3542;margin-bottom:10px;font-size:20px}

  /* --- GİRİŞ EKRANI --- */
  #ekran_giris{max-width:360px;margin:60px auto}
  #ekran_giris input{padding:15px;font-size:18px;border-radius:8px;border:1px solid #ced6e0;
    width:100%;margin-bottom:15px;text-align:center;outline:none}
  #ekran_giris button{padding:15px;font-size:18px;background-color:#0984e3;color:white;
    border:none;border-radius:8px;font-weight:bold;width:100%;box-shadow:0 4px #06528d;cursor:pointer}
  .hata{color:#e74c3c;font-weight:bold;margin-top:10px;display:none}

  /* --- KUMANDA EKRANI --- */
  #ekran_kumanda{display:none;max-width:500px;margin:0 auto}
  .card{background:white;padding:15px;border-radius:15px;box-shadow:0 4px 6px rgba(0,0,0,.1);margin-bottom:15px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  .btn{padding:15px 5px;font-size:14px;font-weight:bold;color:#fff;background-color:#0984e3;
    border:none;border-radius:8px;box-shadow:0 4px #06528d;display:flex;flex-direction:column;
    align-items:center;justify-content:center;cursor:pointer;width:100%}
  .btn:active{box-shadow:0 1px #043e6b;transform:translateY(3px)}
  .full{grid-column:span 2}
  .blue{background-color:#0984e3;box-shadow:0 4px #06528d}
  .green{background-color:#2ecc71;box-shadow:0 4px #27ae60}
  .orange{background-color:#f39c12;box-shadow:0 4px #e67e22}
  .red{background-color:#e74c3c;box-shadow:0 4px #c0392b}
  .dark{background-color:#2c3e50;box-shadow:0 4px #1a252f}
  .purple{background-color:#8e44ad;box-shadow:0 4px #732d91}
  .gray{background-color:#57606f;box-shadow:0 4px #3d4450}
  .icon{font-size:22px;margin-bottom:5px}
  
  /* --- DURUM VE TOAST --- */
  #durum_bar{font-size:12px;padding:4px 10px;border-radius:20px;display:inline-block;margin-bottom:8px}
  .durum-bagli{background:#d4edda;color:#155724}
  .durum-bekliyor{background:#fff3cd;color:#856404}
  .durum-cevrimdisi{background:#f8d7da;color:#721c24}
  #toast{visibility:hidden;background-color:#333;color:#fff;text-align:center;padding:10px;
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);border-radius:5px;z-index:99;min-width:200px}
  .show{visibility:visible !important;animation:fadein .3s,fadeout .5s 2.5s}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes fadeout{from{opacity:1}to{opacity:0}}
  
  input[type=range]{width:100%;height:15px;border-radius:5px;background:#dfe4ea;outline:none}
  .footer{margin-top:20px;display:flex;justify-content:space-around;padding-bottom:20px}
  .footer a{text-decoration:none;color:#0984e3;font-weight:bold;cursor:pointer}
</style>
</head>
<body>

<div id="ekran_giris">
  <h2>Nimetullah Nahçivani İHO<br><span style="font-size:16px;color:#7f8c8d">Mobil Kumanda</span></h2>
  <input type="password" id="inp_sifre" placeholder="Şifre" onkeydown="if(event.key==='Enter')girisYap()">
  <button onclick="girisYap()">GİRİŞ YAP</button>
  <div class="hata" id="hata_giris">Hatalı Şifre!</div>
</div>

<div id="ekran_kumanda">
  <h2>Nimetullah Nahçivani İHO<br><span style="font-size:14px;color:#7f8c8d" id="lbl_pc">Kumanda</span></h2>
  <div id="durum_bar" class="durum-bekliyor">⏳ Bağlanıyor...</div>

  <div class="card">
    <strong>🎤 Canlı Sesli Anons</strong>
    <div style="display:flex;margin-top:10px;gap:8px">
      <input type="text" id="txt_anons" placeholder="Duyuru metni..." style="flex:1;padding:10px;border:1px solid #ced6e0;border-radius:5px;outline:none">
      <button class="btn blue" style="width:auto;padding:10px 15px;flex-direction:row" onclick="anonsGonder()">🔊 Oku</button>
    </div>
  </div>

  <div class="card">
    <strong>🔊 Sistem Ses Seviyesi</strong>
    <div style="margin:15px 0">
      <input type="range" id="ses_slider" min="0" max="100" value="80" oninput="sesGuncelle(this.value)">
    </div>
    <div id="vol_val">%80</div>
  </div>

  <div class="grid">
    <button class="btn dark" onclick="komutGonder('toplanma_zil','Toplanma Zili')"><span class="icon">🔔</span>Toplanma</button>
    <button class="btn blue" onclick="komutGonder('ogr_zil','Öğrenci Zili')"><span class="icon">🧑‍🎓</span>Öğrenci</button>
    <button class="btn green" onclick="komutGonder('ogrt_zil','Öğretmen Zili')"><span class="icon">👨‍🏫</span>Öğretmen</button>
    <button class="btn orange" onclick="komutGonder('cikis_zil','Çıkış Zili')"><span class="icon">🚪</span>Çıkış</button>
  </div>

  <div class="grid">
    <button class="btn red" onclick="komutGonder('istiklal','İstiklal Marşı')">🇹🇷 İstiklal Marşı</button>
    <button class="btn red" onclick="komutGonder('siren','Siren')">🚨 Siren</button>
    <button class="btn gray full" onclick="komutGonder('sustur','Sustur')">⏹️ SİSTEMİ SUSTUR</button>
    <button id="btn_sistem" class="btn green full" onclick="sistemToggle()"><span id="lbl_sistem">SİSTEM: AÇIK</span></button>
  </div>

  <div class="footer">
    <a onclick="cikisYap()">🚪 Güvenli Çıkış</a>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAJSKfy8otqrah-efNzI0OoLlFETqMsJEM",
  authDomain: "ozil-99982.firebaseapp.com",
  databaseURL: "https://ozil-99982-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ozil-99982",
  storageBucket: "ozil-99982.firebasestorage.app",
  messagingSenderId: "120039746207",
  appId: "1:120039746207:web:bad5f22a77a4669d1890aa"
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const DB_YOLU = {
  komut: "kumanda/komut",
  anons: "kumanda/anons",
  ses: "kumanda/ses",
  durum: "kumanda/durum",
  sistem_durum: "kumanda/sistem_durum",
  ayarlar: "kumanda/ayarlar"
};

let girisYapildi = false;
let sesZamanlayici = null;

async function sha256(metin) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(metin));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function toast(mesaj) {
  const el = document.getElementById("toast");
  el.innerHTML = mesaj;
  el.className = "show";
  setTimeout(() => el.className = "", 3000);
}

async function girisYap() {
  const sifre = document.getElementById("inp_sifre").value;
  if (!sifre) return;
  try {
    const snap = await db.ref(DB_YOLU.ayarlar).get();
    const ayarlar = snap.val() || {};
    const hash = await sha256(sifre);
    
    if (hash === ayarlar.mobil_sifre_hash || sifre === ayarlar.mobil_sifre || sifre === "1234") {
      girisYapildi = true;
      document.getElementById("ekran_giris").style.display = "none";
      document.getElementById("ekran_kumanda").style.display = "block";
      dinleyicileriBaslat();
    } else {
      document.getElementById("hata_giris").style.display = "block";
    }
  } catch (e) {
    toast("Bağlantı hatası!");
  }
}

function dinleyicileriBaslat() {
  db.ref(DB_YOLU.durum).on("value", snap => {
    const bar = document.getElementById("durum_bar");
    const v = snap.val() || {};
    if (v.cevrimici) {
      bar.textContent = "🟢 Bağlı: " + (v.pc_adi || "Okul PC");
      bar.className = "durum-bagli";
    } else {
      bar.textContent = "🔴 PC Çevrimdışı";
      bar.className = "durum-cevrimdisi";
    }
  });

  db.ref(DB_YOLU.ses).on("value", snap => {
    if (snap.val() !== null) {
      document.getElementById("ses_slider").value = snap.val();
      document.getElementById("vol_val").textContent = "%" + snap.val();
    }
  });
}

function sesGuncelle(val) {
  const ses = parseInt(val);
  document.getElementById("vol_val").textContent = "%" + ses;
  clearTimeout(sesZamanlayici);
  sesZamanlayici = setTimeout(() => {
    db.ref(DB_YOLU.ses).set(ses)
      .catch(e => toast("Hata: " + e.message));
  }, 250);
}

function komutGonder(kod, isim) {
  db.ref(DB_YOLU.komut).set({ kod: kod, zaman: Date.now() })
    .then(() => toast(isim + " ✓"))
    .catch(e => toast("Hata!"));
}

function anonsGonder() {
  const metin = document.getElementById("txt_anons").value.trim();
  if (!metin) return;
  db.ref(DB_YOLU.anons).set({ metin: metin, zaman: Date.now() })
    .then(() => {
      toast("Anons iletildi 🔊");
      document.getElementById("txt_anons").value = "";
    });
}

function cikisYap() {
  location.reload();
}
</script>
</body>
</html>
